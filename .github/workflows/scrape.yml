name: Daily Scrape & Deploy

on:
  schedule:
    - cron: '0 5 * * *'  # Every day at 05:00 UTC (07:00 NL time)
  workflow_dispatch: # Manual trigger via GitHub UI

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run forklift scraper (Mascus NL/DE/UK/FR)
        run: cd scrapers && python scrape_all.py --pages 5
        continue-on-error: true

      - name: Run Machineseeker scraper (specialist equipment)
        run: cd scrapers && python machineseeker.py --pages 3
        continue-on-error: true

      - name: Merge all data sources
        run: |
          python3 << 'PYEOF'
          import csv, os, glob
          # Merge all CSV files from output/
          all_rows = []
          fieldnames = ['id', 'model', 'brand', 'year', 'hours', 'price', 'source', 'region', 'url', 'image_url']
          for f in glob.glob('output/*_listings.csv'):
              try:
                  with open(f, 'r') as fh:
                      reader = csv.DictReader(fh)
                      for row in reader:
                          # Normalize to standard fields
                          normalized = {k: row.get(k, '') for k in fieldnames}
                          if normalized['model'] and normalized['price']:
                              all_rows.append(normalized)
              except Exception as e:
                  print(f'Error reading {f}: {e}')
          # Write merged
          if all_rows:
              with open('output/all_listings.csv', 'w', newline='') as fh:
                  writer = csv.DictWriter(fh, fieldnames=fieldnames)
                  writer.writeheader()
                  writer.writerows(all_rows)
              print(f'Merged {len(all_rows)} total listings from {len(glob.glob("output/*_listings.csv"))} files')
          PYEOF
        continue-on-error: true

      - name: Convert and embed data
        run: |
          python3 << 'PYEOF'
          import csv, json, re, os

          csv_path = 'output/all_listings.csv'
          if not os.path.exists(csv_path):
              print('No CSV found - keeping existing data.')
              exit(0)

          with open(csv_path, 'r') as f:
              rows = list(csv.DictReader(f))
          if len(rows) == 0:
              print('Empty CSV - keeping existing data.')
              exit(0)

          for r in rows:
              r['year']=int(r.get('year',0)); r['hours']=int(r.get('hours',0)); r['price']=int(r.get('price',0))
              r.setdefault('url',''); r.setdefault('photo',''); r.setdefault('brand','unknown')

          with open('output/merged_listings.json', 'w') as f:
              json.dump(rows, f, ensure_ascii=False)

          j = json.dumps(rows, ensure_ascii=False)
          with open('index.html', 'r', encoding='utf-8-sig') as f:
              html = f.read()
          html = re.sub(r'let all = \[.*?\], filtered', 'let all = ' + j + ', filtered', html, count=1, flags=re.DOTALL)
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)

          # Summary
          brands = {}
          for r in rows:
              b = r.get('brand','unknown')
              brands[b] = brands.get(b,0) + 1
          print(f'Embedded {len(rows)} listings:')
          for b,c in sorted(brands.items(), key=lambda x:-x[1]):
              print(f'  {b}: {c}')
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "ForkFlip Bot"
          git config user.email "bot@forkflip.app"
          git add index.html output/ -f
          git diff --cached --quiet && echo "No changes to commit" || (git commit -m "data: scrape $(date +%Y-%m-%d) - multi-brand" && git push)
